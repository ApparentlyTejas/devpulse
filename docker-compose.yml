# =============================================================================
# DevPulse — base Compose file.
#
# This file describes services as they would run in a production-ish way:
# images built, no source bind-mounts, no reload. For dev ergonomics,
# `docker-compose.override.yml` adds bind-mounts and --reload.
#
# Usage:
#   make up       (or `docker compose up -d --build`)
#   make logs
#   make down
# =============================================================================

name: devpulse

services:

  # ---------------------------------------------------------------------------
  # Postgres 16 with pgvector extension preinstalled.
  # ---------------------------------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg16
    container_name: devpulse-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-devpulse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpulse}
      POSTGRES_DB: ${POSTGRES_DB:-devpulse}
      # Init scripts only run on a fresh data volume.
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      # Expose to host so you can use `psql` / a GUI from your laptop.
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infrastructure/docker/postgres/init.sql:/docker-entrypoint-initdb.d/00-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-devpulse} -d ${POSTGRES_DB:-devpulse}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks:
      - devpulse

  # ---------------------------------------------------------------------------
  # Redis 7 — cache + queue broker + WebSocket pub/sub later.
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: devpulse-redis
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - devpulse

  # ---------------------------------------------------------------------------
  # FastAPI app.
  # ---------------------------------------------------------------------------
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: devpulse-backend:local
    container_name: devpulse-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # These take precedence over .env and force the right service hostnames
      # inside the Compose network regardless of what's in .env.
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - devpulse

  # ---------------------------------------------------------------------------
  # Background worker (APScheduler + arq). Disabled until Phase 1, step 11+.
  # Declared here so the topology is visible from day one.
  # ---------------------------------------------------------------------------
  # worker:
  #   build: { context: ./backend, dockerfile: Dockerfile }
  #   image: devpulse-backend:local
  #   command: ["python", "-m", "app.workers.scheduler"]
  #   env_file: [.env]
  #   depends_on:
  #     postgres: { condition: service_healthy }
  #     redis:    { condition: service_healthy }
  #   networks: [devpulse]

  # ---------------------------------------------------------------------------
  # MCP server. Wired up in Phase 2, step 17.
  # ---------------------------------------------------------------------------
  # mcp:
  #   build: { context: ./backend, dockerfile: Dockerfile }
  #   image: devpulse-backend:local
  #   command: ["python", "-m", "app.mcp_server.server"]
  #   env_file: [.env]
  #   networks: [devpulse]

# -----------------------------------------------------------------------------
# Named volumes: state persists across `docker compose down`. Wiped by
# `docker compose down -v`.
# -----------------------------------------------------------------------------
volumes:
  postgres-data:
    name: devpulse_postgres_data
  redis-data:
    name: devpulse_redis_data

# -----------------------------------------------------------------------------
# Single user-defined network. Services find each other by service name.
# -----------------------------------------------------------------------------
networks:
  devpulse:
    name: devpulse
    driver: bridge
