# =============================================================================
# Alembic configuration.
#
# `sqlalchemy.url` here is intentionally empty — env.py injects it from
# `app.core.config.get_settings()` so migrations and the app share a single
# source of truth for the DSN.
# =============================================================================

[alembic]
script_location = %(here)s/alembic

# Filenames: 2026_05_20_2027_abcd1234_add_users_table.py
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Allow imports of `app.*` from migration scripts.
prepend_sys_path = .

# Use UTC timestamps in filenames.
timezone = UTC

# Set by env.py at runtime.
sqlalchemy.url =

truncate_slug_length = 40
sourceless = false


# ---- Logging --------------------------------------------------------------

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
